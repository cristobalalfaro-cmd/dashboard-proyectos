<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Dashboard de Proyectos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial}
    .wrap{max-width:1200px;margin:32px auto;padding:0 16px}
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
    .card{border:1px solid #e5e7eb;border-radius:12px;padding:14px}
    .card h3{margin:0 0 6px 0;font-size:14px;font-weight:600;opacity:.7}
    .card .v{font-size:22px;font-weight:700}
    .filters{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0 24px}
    select,input{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;background:#fff}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
    table{width:100%;border-collapse:collapse;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden}
    th,td{padding:8px 10px;border-bottom:1px solid #f0f0f0;font-size:13px}
    th{background:#fafafa;text-align:left}
    .muted{opacity:.65}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.filters{grid-template-columns:repeat(2,1fr)}}

    /* Overlay acceso (solo vista general) */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9999}
    .dialog{width:min(92vw,420px);background:#fff;border-radius:16px;padding:22px;border:1px solid #e5e7eb;box-shadow:0 20px 50px rgba(0,0,0,.15)}
    .dialog h2{margin:0 0 8px 0;font-size:18px}
    .dialog p{margin:0 0 14px 0;font-size:14px;opacity:.8}
    .dialog input{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px}
    .dialog button{margin-top:10px;width:100%;padding:10px;border:0;border-radius:10px;background:#111;color:#fff;font-weight:600;cursor:pointer}
    .error{color:#b00020;font-size:13px;margin-top:8px;display:none}
    .shake{animation:shake .25s}
    @keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-3px)}100%{transform:translateX(0)}}

    /* Banner de cliente */
    .banner{display:none;margin:0 0 12px 0;padding:10px 14px;border-radius:12px;border:1px solid #dbe4ff;background:#eef3ff;color:#0b3d91;font-weight:600}
    .banner small{font-weight:500;opacity:.8;margin-left:8px}

    /* Encabezados ordenables */
    th.sortable{cursor:pointer;user-select:none;position:relative;padding-right:20px}
    th.sortable::after{
      content: attr(data-sort);
      position:absolute; right:6px; top:50%; transform:translateY(-50%);
      font-size:12px; opacity:.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 style="margin:0 0 8px 0">Dashboard de Proyectos</h1>
    <div id="client-banner" class="banner"></div>

    <!-- KPIs -->
    <div class="kpis">
      <div class="card"><h3>N° Clientes</h3><div id="kpi-clientes" class="v">—</div></div>
      <div class="card"><h3>N° Proyectos activos</h3><div id="kpi-proyectos" class="v">—</div></div>
      <div class="card"><h3>N° Tareas pendientes</h3><div id="kpi-pendientes" class="v">—</div></div>
      <div class="card"><h3>N° Tareas vencidas</h3><div id="kpi-vencidas" class="v">—</div></div>
      <div class="card"><h3>N° Tareas On Hold</h3><div id="kpi-onhold" class="v">—</div></div>
    </div>

    <!-- Filtros -->
    <div class="filters">
      <select id="f-cliente"><option value="">Cliente (todos)</option></select>
      <select id="f-proyecto"><option value="">Proyecto (todos)</option></select>
      <select id="f-owner"><option value="">Owner (todos)</option></select>
      <select id="f-estatus"><option value="">Estatus (todos)</option></select>
    </div>

    <!-- Gráficos -->
    <div class="grid">
      <div class="card"><h3>Distribución por Estatus</h3><canvas id="chEstatus" height="220"></canvas></div>
      <div class="card"><h3>Distribución por Owner</h3><canvas id="chOwner" height="220"></canvas></div>
    </div>

    <!-- Tabla -->
    <div class="card">
      <h3>Detalle</h3>
      <table id="tbl"><thead></thead><tbody></tbody></table>
      <div class="muted" id="count"></div>
    </div>
  </div>

  <!-- Librerías -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <script>
    /* ================== CONFIG ================== */
    const EXCEL_FILE = "Template_Proyectos_Dashboard.xlsx";
    // Clave cifrada (SHA-256) de "Tomi.2016"
    const GENERAL_VIEW_HASH = "488c013cb6bf0d8e7dae92e89d72a058ed3181a7c8bed1bceb456b2176bb1746";
    const SESSION_FLAG = "dashboard_auth_ok";
    const SESSION_ALLOWED_CLIENTS = "allowed_clients";

    /* ================== MAPEOS ================== */
    const FIELD_MAP = {
      cliente:   ["Cliente","Account","Empresa"],
      proyecto:  ["Proyecto","Nombre Proyecto","Project"],
      tarea:     ["Tarea","Actividad","Nombre Tarea","Task","Actividad/Tarea"],
      tipo:      ["Tipo","Category"],
      estatus:   ["Estatus","Estado","Status"],
      owner:     ["Owner","Responsable","Asignado","Ejecutor"],
      deadline:  ["Deadline","Fecha Limite","Fecha Límite","Vencimiento","Due Date"]
    };

    /* ================== URL / normalización ================== */
    const urlParams = new URLSearchParams(window.location.search);
    const clienteParamRaw = urlParams.get('cliente');
    const normalizeKey = (s) => (s ?? "").toString().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
    function parseClienteParam(){
      if(!clienteParamRaw) return null;
      return clienteParamRaw.split(',').map(s=>s.trim()).filter(Boolean).map(normalizeKey);
    }

    /* ================== Utils ================== */
    const normStr = (s) => (s ?? "").toString().trim();
    const toDate  = (v) => {
      if (!v && v!==0) return null;
      try {
        if (typeof v === "number") { const start = new Date(Date.UTC(1899,11,30)); return new Date(start.getTime()+v*86400000); }
        const d = new Date(v); return isNaN(d)?null:d;
      } catch { return null; }
    };
    const today0 = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
    const fmt = (n) => new Intl.NumberFormat("es-CL").format(n);
    const isFinalizado = (txt) => { const t = normalizeKey(txt); return t==="finalizado"||t==="finalizada"||t==="cerrado"||t==="completado"||t==="completada"; };
    const isOnHold = (txt) => { const t=normalizeKey(txt); return t==="on hold"||t==="onhold"; };

    function pick(obj, aliases){ for (const a of aliases){ if (a in obj) return obj[a]; } return undefined; }
    function normalizeRow(r){
      return {
        cliente:   normStr(pick(r, FIELD_MAP.cliente)),
        proyecto:  normStr(pick(r, FIELD_MAP.proyecto)),
        tarea:     normStr(pick(r, FIELD_MAP.tarea)),
        tipo:      normStr(pick(r, FIELD_MAP.tipo)).toLowerCase(),
        estatus:   normStr(pick(r, FIELD_MAP.estatus)),
        owner:     normStr(pick(r, FIELD_MAP.owner)),
        deadline:  toDate(pick(r, FIELD_MAP.deadline)),
        _raw: r
      };
    }
    function uniqueSorted(arr){ return [...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es')); }

    /* ================== Estado ================== */
    let RAW=[], VIEW=[], chEstatus, chOwner;

    /* ================== Banner ================== */
    function updateBanner() {
      const banner = document.getElementById('client-banner');
      const params = parseClienteParam();
      if (params && params.length) {
        const names = uniqueSorted(RAW.map(r => r.cliente)).filter(Boolean);
        const label = names.length ? names.join(', ') : (clienteParamRaw || 'Cliente');
        banner.innerHTML = `Vista restringida a: ${label} <small>(solo sus datos)</small>`;
        banner.style.display = 'block';
      } else {
        banner.style.display = 'none';
      }
    }

    /* ================== KPIs ================== */
    function renderKPIs(){
      const clientes = uniqueSorted(VIEW.map(r=>r.cliente)).length;

      // Proyectos activos: nombres distintos con tipo = "proyecto"
      const proyectosSet = new Set(
        VIEW.filter(r => r.tipo === "proyecto").map(r => r.proyecto).filter(Boolean)
      );
      const proyectosActivos = proyectosSet.size;

      const pendientes = VIEW.filter(r => !isFinalizado(r.estatus)).length;

      const hoy = today0().getTime();
      const vencidas = VIEW.filter(r => !isFinalizado(r.estatus) && r.deadline && r.deadline.getTime() < hoy).length;

      // On Hold: estatus "On Hold" O falta Deadline/Estatus/Owner
      const onHold = VIEW.filter(r => isOnHold(r.estatus) || !(r.deadline) || !(r.estatus) || !(r.owner)).length;

      document.getElementById("kpi-clientes").textContent   = fmt(clientes);
      document.getElementById("kpi-proyectos").textContent  = fmt(proyectosActivos);
      document.getElementById("kpi-pendientes").textContent = fmt(pendientes);
      document.getElementById("kpi-vencidas").textContent   = fmt(vencidas);
      document.getElementById("kpi-onhold").textContent     = fmt(onHold);
    }

    /* ================== Filtros ================== */
    function renderFilters(){
      const setOpts = (id, values) => {
        const el = document.getElementById(id);
        const selected = el.value;
        const label = el.options[0]?.text || "Todos";
        el.innerHTML = `<option value="">${label}</option>` + uniqueSorted(values).map(v=>`<option>${v}</option>`).join("");
        if (values.includes(selected)) el.value = selected;
      };
      setOpts("f-cliente",  VIEW.map(r=>r.cliente));
      setOpts("f-proyecto", VIEW.map(r=>r.proyecto));
      setOpts("f-owner",    VIEW.map(r=>r.owner));
      setOpts("f-estatus",  VIEW.map(r=>r.estatus));
    }
    function applyFilters(){
      const c = normalizeKey(document.getElementById("f-cliente").value);
      const p = normalizeKey(document.getElementById("f-proyecto").value);
      const o = normalizeKey(document.getElementById("f-owner").value);
      const e = normalizeKey(document.getElementById("f-estatus").value);
      VIEW = RAW.filter(r=>{
        const okC = !c || normalizeKey(r.cliente)  === c;
        const okP = !p || normalizeKey(r.proyecto) === p;
        const okO = !o || normalizeKey(r.owner)    === o;
        const okE = !e || normalizeKey(r.estatus)  === e;
        return okC && okP && okO && okE;
      });
      renderKPIs(); renderFilters(); renderCharts(); renderTable();
    }

    /* ================== Gráficos ================== */
    function renderCharts(){
      const COLORS = {
        "Finalizado": "#1f77b4",          // azul
        "Iniciado en Plazo": "#2ca02c",   // verde
        "No iniciado": "#ffbf00",         // amarillo
        "On Hold": "#ff7f0e",             // naranjo
        "Atrasado": "#d62728",            // rojo
        "Otros": "#9e9e9e"
      };
      const hoy = today0().getTime();
      const buckets = { "Finalizado":0, "Iniciado en Plazo":0, "No iniciado":0, "On Hold":0, "Atrasado":0, "Otros":0 };

      VIEW.forEach(r=>{
        const est = (r.estatus||"").trim();
        const keyNorm = normalizeKey(est);
        let cat = "Otros";

        if (isFinalizado(est)) cat = "Finalizado";
        else if (isOnHold(est)) cat = "On Hold";
        else if (keyNorm==="iniciado en plazo"||keyNorm==="iniciadoenplazo"||keyNorm==="en plazo"||keyNorm==="enplazo"||keyNorm==="iniciado") cat = "Iniciado en Plazo";
        else if (keyNorm==="no iniciado"||keyNorm==="noiniciado"||keyNorm==="pendiente") cat = "No iniciado";
        else if (keyNorm==="atrasado") cat = "Atrasado";

        // Atrasado por deadline vencido y no finalizado
        if (!isFinalizado(est) && r.deadline && r.deadline.getTime() < hoy) cat = "Atrasado";

        buckets[cat] = (buckets[cat]||0)+1;
      });

      const desiredOrder = ["Finalizado","Iniciado en Plazo","No iniciado","On Hold","Atrasado","Otros"];
      const labels = desiredOrder.filter(k => buckets[k] > 0);
      const counts = labels.map(l => buckets[l]);
      const bg = labels.map(l => COLORS[l]);

      if (chEstatus) chEstatus.destroy();
      chEstatus = new Chart(document.getElementById("chEstatus"), {
        type: "pie",
        data: { labels, datasets: [{ data: counts, backgroundColor: bg }] },
        options: { responsive:true }
      });

      // Owner
      const byOwner = {};
      VIEW.forEach(r=>{ const k=r.owner||"Sin owner"; byOwner[k]=(byOwner[k]||0)+1; });
      const ownerLabels = Object.keys(byOwner);
      const ownerCounts = ownerLabels.map(k=>byOwner[k]);
      if (chOwner) chOwner.destroy();
      chOwner = new Chart(document.getElementById("chOwner"), { type: "pie", data: { labels: ownerLabels, datasets: [{ data: ownerCounts }] }, options: { responsive:true } });
    }

    /* ================== Ordenamiento para Detalle ================== */
    let sortState = { key: null, dir: 1 }; // dir: 1 asc, -1 desc
    const SORT_KEYS = ["cliente","proyecto","tarea","tipo","estatus","owner","deadline"];
    function cmpText(a,b){ return (a||"").toString().localeCompare((b||"").toString(), "es", {sensitivity:"base"}); }
    function cmpDate(a,b){ const ax = a ? a.getTime() : 0; const bx = b ? b.getTime() : 0; return ax - bx; }

    /* ================== Tabla (incluye columna Tarea + filas rojas atrasadas) ================== */
    function renderTable(){
      const labels = ["Cliente","Proyecto","Tarea","Tipo","Estatus","Owner","Deadline"];
      const thead = document.querySelector("#tbl thead");
      const tbody = document.querySelector("#tbl tbody");

      // Encabezados ordenables
      thead.innerHTML = "<tr>" + labels.map((l, i) => {
        const active = SORT_KEYS[i] === sortState.key;
        const arrow  = active ? (sortState.dir === 1 ? "▲" : "▼") : "";
        return `<th class="sortable" data-col="${i}" data-sort="${arrow}">${l}</th>`;
      }).join("") + "</tr>";

      // Copia y orden
      let rows = [...VIEW];
      if (sortState.key){
        const idx = SORT_KEYS.indexOf(sortState.key);
        rows.sort((a,b)=>{
          let res = SORT_KEYS[idx] === "deadline" ? cmpDate(a.deadline, b.deadline)
                                                  : cmpText(a[SORT_KEYS[idx]], b[SORT_KEYS[idx]]);
          return res * sortState.dir;
        });
      } else {
        rows.sort((a,b)=>{
          const c = cmpText(a.cliente, b.cliente); if (c) return c;
          const p = cmpText(a.proyecto, b.proyecto); if (p) return p;
          return cmpText(a.tarea, b.tarea);
        });
      }

      const hoy = today0().getTime();

      tbody.innerHTML = rows.map(r=>{
        // Regla de "tarea atrasada": tipo=tarea, no finalizado y deadline pasado
        const isTask = (r.tipo||"").toLowerCase() === "tarea";
        const overdue = isTask && !isFinalizado(r.estatus) && r.deadline && r.deadline.getTime() < hoy;
        const rowStyle = overdue ? 'style="color:#d62728"' : '';

        const cells = [
          r.cliente || "",
          r.proyecto || "",
          r.tarea || "",
          r.tipo || "",
          r.estatus || "",
          r.owner || "",
          r.deadline ? r.deadline.toLocaleDateString() : ""
        ];
        return `<tr ${rowStyle}>` + cells.map(c=>`<td>${c??""}</td>`).join("") + "</tr>";
      }).join("");

      document.getElementById("count").textContent = `${rows.length} fila(s)`;

      // Click para ordenar
      thead.querySelectorAll("th.sortable").forEach(th=>{
        th.addEventListener("click", () => {
          const col = Number(th.getAttribute("data-col"));
          const key = SORT_KEYS[col];
          if (sortState.key === key){ sortState.dir = -sortState.dir; }
          else { sortState.key = key; sortState.dir = 1; }
          renderTable();
        });
      });
    }

    /* ================== Carga Excel (+ hard cap y anclaje de cliente) ================== */
    async function loadExcel(){
      const res = await fetch(EXCEL_FILE);
      if(!res.ok){ alert("No pude cargar el Excel"); return; }
      const buf = await res.arrayBuffer();
      const wb  = XLSX.read(buf, {type:"array"});

      // Preferir hoja "Tareas" si existe, si no usar la primera
      const sheetName = wb.SheetNames.includes("Tareas") ? "Tareas" : wb.SheetNames[0];
      const sheet = wb.Sheets[sheetName];

      // 1) Objeto por encabezados (si existen)
      const rowsObj = XLSX.utils.sheet_to_json(sheet, {defval:""});

      // 2) Si estamos en "Tareas", inyectar columna D como "Tarea" si estuviera vacía o sin nombre estándar
      if (sheetName === "Tareas" && sheet["!ref"]) {
        const range = XLSX.utils.decode_range(sheet["!ref"]);
        // Asumimos fila 1 como encabezado y datos desde 2
        rowsObj.forEach((row, idx) => {
          const excelRowNumber = range.s.r + 1 + 1 + idx; // +1 a base 1, +1 saltar encabezado
          const cellAddr = "D" + excelRowNumber; // Columna D
          const cell = sheet[cellAddr];
          const valD = cell ? cell.v : "";
          // Si el campo Tarea no vino mapeado, o está vacío, usamos D
          if (!row["Tarea"] && !row["tarea"] && valD !== undefined) {
            row["Tarea"] = valD;
          }
        });
      }

      // Normalizar a nuestro esquema
      RAW = rowsObj.map(normalizeRow);

      // Hard cap por cliente (vistas públicas) + anclaje
      const clientesParam = parseClienteParam();
      if (clientesParam && clientesParam.length) {
        RAW = RAW.filter(r => clientesParam.includes(normalizeKey(r.cliente)));
        sessionStorage.setItem(SESSION_ALLOWED_CLIENTS, JSON.stringify(clientesParam));
        // Bloquear filtro Cliente
        queueMicrotask(() => {
          const fc = document.getElementById('f-cliente');
          if (fc) {
            const label = (uniqueSorted(RAW.map(x=>x.cliente)).join(', ')) || clienteParamRaw || "Cliente";
            fc.innerHTML = `<option>${label}</option>`;
            fc.value = label;
            fc.disabled = true;
          }
        });
      }

      VIEW = [...RAW];
      updateBanner();
      renderKPIs(); renderFilters(); renderCharts(); renderTable();
    }

    /* ================== Password (solo vista general) ================== */
    async function checkPassword(inputPassword){
      const enc = new TextEncoder().encode(inputPassword);
      const hashBuffer = await crypto.subtle.digest("SHA-256", enc);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
      return hashHex === GENERAL_VIEW_HASH;
    }
    function shouldRequirePassword(){
      const c = parseClienteParam();
      return !c || c.length === 0;
    }
    function showPasswordOverlay(){
      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      overlay.innerHTML = `
        <div class="dialog" id="dlg">
          <h2>Acceso</h2>
          <p>Ingresa la clave para ver la vista general.</p>
          <input type="password" id="pwd" placeholder="Clave" />
          <button id="btn">Ingresar</button>
          <div class="error" id="err">Clave incorrecta</div>
        </div>`;
      document.body.appendChild(overlay);

      const dlg = document.getElementById('dlg');
      const input = document.getElementById('pwd');
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');

      async function attempt(){
        const ok = await checkPassword(input.value);
        if(ok){
          sessionStorage.setItem(SESSION_FLAG, "1");
          document.body.removeChild(overlay);
          loadExcel();
        }else{
          err.style.display = 'block';
          dlg.classList.remove('shake'); void dlg.offsetWidth; dlg.classList.add('shake');
          input.focus(); input.select();
        }
      }
      btn.addEventListener('click', attempt);
      input.addEventListener('keydown', e=>{ if(e.key==='Enter') attempt(); });
      input.focus();
    }

    /* ================== Init con anclaje de cliente ================== */
    (function init(){
      const clientesParam = parseClienteParam();
      const saved = sessionStorage.getItem(SESSION_ALLOWED_CLIENTS);

      // Si no hay ?cliente= pero ya estaba fijado en esta pestaña, reponerlo
      if ((!clientesParam || !clientesParam.length) && saved) {
        const arr = JSON.parse(saved);
        const base = window.location.origin + window.location.pathname;
        const q = "cliente=" + arr.map(encodeURIComponent).join(",");
        window.location.replace(base + "?" + q);
        return;
      }

      if (shouldRequirePassword()){
        if (sessionStorage.getItem(SESSION_FLAG) === "1"){ loadExcel(); }
        else { showPasswordOverlay(); }
      } else {
        loadExcel();
      }
    })();

    // Eventos filtros
    ["f-cliente","f-proyecto","f-owner","f-estatus"].forEach(id=>{
      document.getElementById(id).addEventListener("change", applyFilters);
    });
  </script>
</body>
</html>
