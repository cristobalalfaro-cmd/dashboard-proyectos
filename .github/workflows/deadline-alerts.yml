name: Enviar alertas de deadlines

on:
  schedule:
    - cron: "0 12 * * *"   # Todos los días a las 09:00 Chile (UTC-3)
  workflow_dispatch:        # Permite ejecución manual

permissions:
  contents: read

jobs:
  alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias necesarias
        run: npm install xlsx nodemailer dayjs

      - name: Ejecutar script de alertas
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: node scripts/check-deadlines.js
