name: Enviar alertas de deadlines

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC ≈ 09:00 Chile (UTC-3)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Instalamos solo lo necesario para el script
      - name: Install runtime deps
        run: npm install xlsx nodemailer dayjs

      - name: Run alerts
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: node scripts/check-deadlines.js
